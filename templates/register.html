{% extends "base.html" %}

{% block title %}Register - Budget Planner{% endblock %}

{% block extra_css %}
<style>
/* Full-screen gradient background */
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
}

/* Animated particles */
.bg-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float 15s infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

/* Main content centered */
main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 20px;
}

/* Glass card */
.card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    animation: slideUp 0.6s ease;
    width: 100%;
    max-width: 450px;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

.card-header {
    background: linear-gradient(135deg, #6366f1, #4f46e5) !important;
    border: none !important;
    padding: 40px 30px 30px !important;
    text-align: center;
}

.card-header h4 {
    color: white !important;
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
}

.card-header .logo-icon {
    font-size: 3rem;
    margin-bottom: 15px;
    display: block;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.card-body {
    padding: 30px !important;
}

.card-footer {
    background: rgba(99, 102, 241, 0.05) !important;
    border: none !important;
    padding: 20px 30px !important;
    text-align: center;
}

.card-footer a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.card-footer a:hover {
    color: #4f46e5;
    text-decoration: underline;
}

/* Form styles */
.form-label {
    color: #555;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
}

.form-control {
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f8f9fa;
}

.form-control:focus {
    outline: none;
    border-color: #6366f1;
    background: white;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

/* Button */
.btn-primary {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.3s ease;
    width: 100%;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
}

/* Alert */
.alert {
    border: none;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
}

/* Footer */
footer {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    padding: 20px !important;
    margin-top: 0 !important;
}

footer p {
    color: rgba(255, 255, 255, 0.8) !important;
    font-size: 0.9rem;
}

/* Input group */
.input-icon {
    position: relative;
}

.input-icon .form-control {
    padding-left: 45px;
}

.input-icon i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
}

/* Password strength */
.password-strength {
    height: 4px;
    border-radius: 2px;
    margin-top: 8px;
    background: #e0e0e0;
    overflow: hidden;
}

.password-strength .bar {
    height: 100%;
    width: 0;
    transition: all 0.3s ease;
    border-radius: 2px;
}

/* Responsive */
@media (max-width: 480px) {
    .card-header {
        padding: 30px 20px 20px !important;
    }
    
    .card-body {
        padding: 20px !important;
    }
    
    .card-header h4 {
        font-size: 1.4rem;
    }
}
</style>
{% endblock %}

{% block content %}
<!-- Animated Background Particles -->
<div class="bg-particles">
    {% for i in range(15) %}
    <div class="particle" style="left: {{ i * 6.67 }}%; animation-delay: {{ i * 1 }}s; animation-duration: {{ 12 + i }}s;"></div>
    {% endfor %}
</div>

<main>
    <div class="card">
        <div class="card-header">
            <span class="logo-icon"><i class="fas fa-user-plus"></i></span>
            <h4>Create Account</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3 input-icon">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-1"></i> Username
                    </label>
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Choose a username" required minlength="3"
                           style="padding-left: 45px;">
                    <div class="form-text">At least 3 characters</div>
                </div>
                <div class="mb-3 input-icon">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope me-1"></i> Email
                    </label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Enter your email" required
                           style="padding-left: 45px;">
                </div>
                <div class="mb-3 input-icon">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-1"></i> Password
                    </label>
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Create a password" required minlength="6"
                           style="padding-left: 45px;">
                    <div class="password-strength">
                        <div class="bar" id="passwordBar"></div>
                    </div>
                    <div class="form-text">At least 6 characters</div>
                </div>
                <div class="mb-4 input-icon">
                    <label for="confirm_password" class="form-label">
                        <i class="fas fa-lock me-1"></i> Confirm Password
                    </label>
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                           placeholder="Confirm your password" required
                           style="padding-left: 45px;">
                </div>
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>
        </div>
        <div class="card-footer">
            <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        </div>
    </div>
</main>

<script>
    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
        const password = this.value;
        const bar = document.getElementById('passwordBar');
        let strength = 0;
        let color = '#e0e0e0';
        
        if (password.length >= 6) strength += 25;
        if (password.length >= 8) strength += 25;
        if (/[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 25;
        
        if (strength <= 25) color = '#ef4444';
        else if (strength <= 50) color = '#f59e0b';
        else if (strength <= 75) color = '#10b981';
        else color = '#059669';
        
        bar.style.width = strength + '%';
        bar.style.background = color;
    });
</script>
{% endblock %}
