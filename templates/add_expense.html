{% extends "base.html" %}

{% block title %}Add Expense - Budget Planner{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fas fa-minus-circle me-2"></i>Add New Expense</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_expense') }}">
                    <div class="mb-3">
                        <label for="amount" class="form-label">
                            <i class="fas fa-rupee-sign me-1"></i>Amount <span class="text-danger">*</span>
                        </label>
                        <input type="number" class="form-control" id="amount" name="amount" 
                               placeholder="Enter amount" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">
                            <i class="fas fa-tag me-1"></i>Category <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select expense category...</option>
                            <option value="Food">Food & Dining</option>
                            <option value="Transport">Transportation</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Rent">Rent/Mortgage</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Insurance">Insurance</option>
                            <option value="Personal">Personal Care</option>
                            <option value="Travel">Travel</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">
                            <i class="fas fa-calendar me-1"></i>Date
                        </label>
                        <input type="date" class="form-control" id="date" name="date">
                        <div class="form-text">Leave empty for today's date</div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-save me-1"></i>Save Expense
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
